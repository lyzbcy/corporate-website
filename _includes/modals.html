<!-- Lightweight portfolio modal shells. Project bodies load only when opened. -->
{% for project in site.portfolio %}
<div class="portfolio-modal modal fade" id="p-{{ project.caption.title | slugify }}" tabindex="-1" role="dialog"
  aria-hidden="true" aria-labelledby="p-title-{{ project.caption.title | slugify }}"
  data-project-url="{{ project.url | relative_url }}" data-project-state="idle">
  <div class="modal-dialog">
    <div class="modal-content">
      <button class="close-modal" data-dismiss="modal" type="button" aria-label="关闭项目详情">
        <div class="lr"><div class="rl"></div></div>
      </button>
      <div class="container">
        <div class="row">
          <div class="col-lg-11 mx-auto">
            <div class="modal-body" data-project-body>
              <div class="project-detail-state" role="status">
                <strong>{{ project.title }}</strong>
                <p>打开时加载项目详情。</p>
                <noscript><a href="{{ project.url | relative_url }}">JavaScript 未启用，前往独立详情页</a></noscript>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endfor %}
<!-- End lightweight portfolio modal shells -->
